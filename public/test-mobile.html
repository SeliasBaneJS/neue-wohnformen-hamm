<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-mfrac">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Preview</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #333;
            display: flex;
            justify-content: center;
        }

        .device {
            width: 375px;
            height: 812px;
            border: 12px solid #111;
            border-radius: 40px;
            overflow: hidden;
            background: white;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>
    <div class="device">
        <iframe src="http://localhost:3000/" title="Mobile View"></iframe>
    </div>
</body>

</html>
